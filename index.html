<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { overflow: hidden; background: #000; }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    .glitch {
      position: relative;
      font-size: clamp(3rem, 10vw, 8rem);
      font-family: 'Segoe UI', sans-serif;
      font-weight: 900;
      letter-spacing: -2px;
      color: #fff;
      text-shadow:
        0 0 8px  #fff,
        0 0 20px #fff,
        0 0 60px #e94560,
        0 0 100px #e94560;
      animation: glow 2.5s ease-in-out infinite alternate;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
    }

    .glitch::before {
      color: #e94560;
      clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
      animation: glitch-top 4s infinite;
    }

    .glitch::after {
      color: #00f5ff;
      clip-path: polygon(0 66%, 100% 66%, 100% 100%, 0 100%);
      animation: glitch-bot 4s infinite;
    }

    @keyframes glow {
      from { text-shadow: 0 0 8px #fff, 0 0 20px #fff, 0 0 60px #e94560, 0 0 100px #e94560; }
      to   { text-shadow: 0 0 12px #fff, 0 0 40px #fff, 0 0 80px #f5a623, 0 0 160px #f5a623, 0 0 240px #f5a623; }
    }

    @keyframes glitch-top {
      0%, 88%, 100% { transform: translate(0); opacity: 0; }
      89%            { transform: translate(-5px, -2px); opacity: 0.8; }
      90%            { transform: translate(5px, 1px);  opacity: 0.8; }
      91%            { transform: translate(0); opacity: 0; }
    }

    @keyframes glitch-bot {
      0%, 88%, 100% { transform: translate(0); opacity: 0; }
      89%            { transform: translate(5px, 2px);  opacity: 0.8; }
      90%            { transform: translate(-5px, -1px); opacity: 0.8; }
      91%            { transform: translate(0); opacity: 0; }
    }

    /* Logo */
    #logo-wrap {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
    }

    #logo-wrap img {
      height: clamp(48px, 8vw, 96px);
      width: auto;
      filter:
        drop-shadow(0 0 6px rgba(255,255,255,0.8))
        drop-shadow(0 0 18px #e94560)
        drop-shadow(0 0 40px #e94560);
      animation: logo-pulse 2.5s ease-in-out infinite alternate, logo-in 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes logo-pulse {
      from { filter: drop-shadow(0 0 6px rgba(255,255,255,0.8)) drop-shadow(0 0 18px #e94560) drop-shadow(0 0 40px #e94560); }
      to   { filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 30px #f5a623) drop-shadow(0 0 70px #f5a623); }
    }

    @keyframes logo-in {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Scanlines overlay */
    #scanlines {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
    }
  </style>
</head>
<body>

  <div id="logo-wrap">
    <img src="logo.png" alt="Logo">
  </div>

  <div id="overlay">
    <h1 class="glitch" data-text="Hello World">Hello World</h1>
  </div>
  <div id="scanlines"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    /* ── Scene setup ───────────────────────────────────────── */
    const scene    = new THREE.Scene();
    scene.fog      = new THREE.FogExp2(0x000000, 0.012);

    const camera   = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 500);
    camera.position.z = 55;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.prepend(renderer.domElement);

    /* ── Star field ────────────────────────────────────────── */
    const starGeo  = new THREE.BufferGeometry();
    const N        = 4000;
    const pos      = new Float32Array(N * 3);
    for (let i = 0; i < N * 3; i++) pos[i] = (Math.random() - 0.5) * 400;
    starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.25 })));

    /* ── Torus knot ────────────────────────────────────────── */
    const knot = new THREE.Mesh(
      new THREE.TorusKnotGeometry(14, 3.2, 220, 24),
      new THREE.MeshPhongMaterial({ color: 0xe94560, emissive: 0x3a000e, shininess: 120 })
    );
    scene.add(knot);

    /* ── Wireframe halo ────────────────────────────────────── */
    const halo = new THREE.Mesh(
      new THREE.TorusKnotGeometry(14.5, 3.5, 120, 14),
      new THREE.MeshBasicMaterial({ color: 0x00f5ff, wireframe: true, transparent: true, opacity: 0.12 })
    );
    scene.add(halo);

    /* ── Lights ────────────────────────────────────────────── */
    scene.add(new THREE.AmbientLight(0x111122));
    const light1 = new THREE.PointLight(0xe94560, 3, 120);
    const light2 = new THREE.PointLight(0x00f5ff, 3, 120);
    const light3 = new THREE.PointLight(0xf5a623, 2, 80);
    light1.position.set( 30,  25, 30);
    light2.position.set(-30, -25, 30);
    light3.position.set(  0,  40, 10);
    scene.add(light1, light2, light3);

    /* ── Floating particle ring ────────────────────────────── */
    const ringGeo = new THREE.BufferGeometry();
    const rCount  = 800;
    const rPos    = new Float32Array(rCount * 3);
    for (let i = 0; i < rCount; i++) {
      const angle = (i / rCount) * Math.PI * 2;
      const r     = 22 + (Math.random() - 0.5) * 6;
      rPos[i * 3]     = Math.cos(angle) * r;
      rPos[i * 3 + 1] = (Math.random() - 0.5) * 6;
      rPos[i * 3 + 2] = Math.sin(angle) * r;
    }
    ringGeo.setAttribute('position', new THREE.BufferAttribute(rPos, 3));
    scene.add(new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xf5a623, size: 0.4 })));

    /* ── Mouse parallax ────────────────────────────────────── */
    let mx = 0, my = 0;
    addEventListener('mousemove', e => {
      mx = (e.clientX / innerWidth  - 0.5) * 2;
      my = (e.clientY / innerHeight - 0.5) * 2;
    });

    /* ── Animation loop ────────────────────────────────────── */
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.01;

      knot.rotation.x += 0.004;
      knot.rotation.y += 0.007;
      halo.rotation.x -= 0.003;
      halo.rotation.z += 0.005;

      // Orbiting lights
      light1.position.x = Math.cos(t * 0.7) * 35;
      light1.position.z = Math.sin(t * 0.7) * 35;
      light2.position.x = Math.cos(t * 0.7 + Math.PI) * 35;
      light2.position.z = Math.sin(t * 0.7 + Math.PI) * 35;

      // Camera parallax
      camera.position.x += (mx * 12 - camera.position.x) * 0.04;
      camera.position.y += (-my * 8  - camera.position.y) * 0.04;
      camera.lookAt(scene.position);

      renderer.render(scene, camera);
    }

    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
